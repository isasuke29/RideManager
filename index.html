<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideManager - Gestión de Talleres</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo-area">
                <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
                <span class="brand-name">RideManager</span>
            </div>
            <nav class="navigation-menu">
                <a href="#inicio" class="nav-link active">Inicio</a>
                <a href="#login" class="nav-link">Login</a>
                <a href="#motocicletas" class="nav-link">Motocicletas</a>
                <a href="#mantenimientos" class="nav-link">Mantenimientos</a>
                <a href="#historial" class="nav-link">Historial</a>
                <a href="#dashboard" class="nav-link highlight">Dashboard</a>
            </nav>
        </div>
    </header>

    <main class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">Gestión Inteligente para Talleres de Motocicletas</h1>
            <p class="hero-description">
                Administra motocicletas, mantenimientos, historiales y estados de servicio desde una sola plataforma optimizada.
            </p>
            <div class="action-container">
                <button type="button" id="btn-iniciar-sesion" class="btn-primary">Iniciar Sesión</button>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 RideManager. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
